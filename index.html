<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blanding — Higher Ed Edition</title>
  <meta name="description" content="Does your .edu actually say anything — or just sound like it does? Paste your URL for an instant AI-powered audit of clichés, brand theatre, and AI search readiness. See how your school stacks up on the live leaderboard.">
  <meta property="og:title" content="Blanding — Is Your University Website Saying Anything?">
  <meta property="og:description" content="Every school promises 'transformative experiences' and 'world-class faculty.' Paste your .edu and find out if your brand actually says something — or just sounds like everyone else. Free AI audit in 60 seconds.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://blandingaudit.netlify.app">
  <meta property="og:image" content="https://blandingaudit.netlify.app/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Blanding — Is Your University Website Saying Anything?">
  <meta name="twitter:description" content="Every school promises 'transformative experiences' and 'world-class faculty.' Paste your .edu and find out if your brand actually says something. Free AI audit in 60 seconds.">
  <meta name="twitter:image" content="https://blandingaudit.netlify.app/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e8e4df; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input::placeholder, textarea::placeholder { color: #555; }
    button { cursor: pointer; }
    button:active { transform: scale(0.98); }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    a { text-decoration: none; }
    /* Skip to content for keyboard users */
    .skip-link { position: absolute; top: -40px; left: 0; background: #c87840; color: #000; padding: 8px 16px; z-index: 200; font-size: 14px; transition: top 0.2s; }
    .skip-link:focus { top: 0; }
    /* Focus visible for keyboard navigation */
    :focus-visible { outline: 2px solid #c87840; outline-offset: 2px; }
    button:focus:not(:focus-visible), input:focus:not(:focus-visible), textarea:focus:not(:focus-visible) { outline: none; }
    /* Screen reader only utility */
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }
    /* Mobile responsive overrides */
    @media (max-width: 640px) {
      .audit-input-row { flex-direction: column !important; }
      .audit-input-row input { width: 100% !important; }
      .audit-input-row button { width: 100% !important; }
      .compare-grid { grid-template-columns: 1fr !important; }
      .compare-vs { display: none; }
      .overview-grid { grid-template-columns: 1fr !important; }
      .strategy-grid { grid-template-columns: 1fr !important; }
      .action-grid { grid-template-columns: 1fr 1fr !important; }
      .benchmark-cats { grid-template-columns: repeat(3, 1fr) !important; }
      .compare-results { flex-direction: column !important; }
      .compare-bar-row { grid-template-columns: 50px 1fr auto 1fr 50px !important; gap: 4px !important; }
      .compare-bar-label { font-size: 7px !important; min-width: 40px !important; }
      .result-card { padding: 24px 16px !important; }
      .tab-bar { gap: 2px !important; }
      .tab-bar button { padding: 6px 10px !important; font-size: 10px !important; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
